<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prototypes</title>
  <style>
    :root { --navy: #243776; --magenta: #BC2B87; --grey: #f4f5f8; }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: var(--grey); color: var(--navy); padding: 56px 24px;
    }
    .wrap { max-width: 720px; margin: 0 auto; }
    h1 { font-size: 30px; margin: 0 0 6px; }
    p.lead { color: #555; margin: 0 0 36px; font-size: 16px; }
    .grid { display: grid; gap: 16px; }
    a.card {
      display: block; text-decoration: none; background: #fff;
      border: 1px solid #e3e6ee; border-radius: 14px; padding: 20px 22px;
      transition: border-color .15s, transform .15s, box-shadow .15s;
    }
    a.card:hover {
      border-color: var(--magenta); transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(36,55,118,0.10);
    }
    a.card h2 { margin: 0 0 4px; font-size: 18px; color: var(--navy); }
    a.card span { color: #777; font-size: 14px; }
    footer { margin-top: 40px; color: #999; font-size: 13px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Prototypes</h1>
    <p class="lead">Select a prototype to view.</p>
    <div class="grid">
      <a class="card" href="givergy-community-homepage/hub.html">
        <h2>Community Homepage V1</h2>
      </a>
    </div>
  </div>
</body>
</html>
