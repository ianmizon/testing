<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Givergy Community · Single-Scroll Hub (v2)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0&display=block" rel="stylesheet" />
<link rel="stylesheet" href="community.css?v=2" />
<style>
  .wrap { max-width: 1180px; margin: 0 auto; padding: 0 40px; }

  /* Header */
  .a-header { position: sticky; top: 0; z-index: 30; background: rgba(255,255,255,0.88); backdrop-filter: saturate(160%) blur(12px); border-bottom: 1px solid var(--giv-grey-15); }
  .a-header__inner { max-width: 1180px; margin: 0 auto; padding: 0 40px; height: 70px; display: flex; align-items: center; gap: 30px; }
  .a-brand { display: flex; align-items: center; gap: 12px; }
  .a-brand img { height: 40px; }
  .a-brand__tag { font-family: var(--giv-font-display); font-weight: 900; font-size: 19px; color: var(--giv-navy); padding-left: 13px; border-left: 1.5px solid var(--giv-grey-25); letter-spacing: -0.01em; }
  .a-nav { display: flex; align-items: center; gap: 6px; margin-left: auto; }
  .a-nav__item { padding: 8px 14px; border-radius: var(--giv-radius-pill); font-weight: 800; font-size: 14px; color: var(--giv-fg-2); cursor: pointer; transition: all 150ms; white-space: nowrap; }
  .a-nav__item:hover { color: var(--giv-navy); background: var(--giv-grey-5); }
  .a-nav__item.active { color: var(--giv-navy); background: var(--giv-cyan-tint); }
  .a-header__right { display: flex; align-items: center; gap: 12px; }

  /* account menu */
  .acct { display: flex; align-items: center; gap: 8px; padding: 5px 8px 5px 6px; border-radius: var(--giv-radius-pill); cursor: pointer; position: relative; border: 1px solid transparent; transition: border-color 150ms, background 150ms; }
  .acct:hover { background: var(--giv-grey-5); border-color: var(--giv-grey-15); }
  .acct__avatar { width: 32px; height: 32px; border-radius: 999px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 800; font-size: 13px; }
  .acct__name { font-weight: 800; font-size: 14px; color: var(--giv-grey-100); }
  .acct__menu { position: absolute; top: 52px; right: 0; width: 246px; background: #fff; border: 1px solid var(--giv-grey-15); border-radius: 10px; box-shadow: var(--giv-shadow-soft); padding: 8px; z-index: 40; }
  .acct__head { padding: 10px 12px 12px; border-bottom: 1px solid var(--giv-grey-15); margin-bottom: 6px; }
  .acct__menu a { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 7px; font-size: 14px; font-weight: 700; color: var(--giv-grey-100); cursor: pointer; }
  .acct__menu a:hover { background: var(--giv-grey-5); }
  .acct__menu a .giv-icon { font-size: 20px; color: var(--giv-grey-75); }
  .acct__menu a .ext { font-size: 15px; margin-left: auto; }

  /* Hero */
  .a-hero { position: relative; overflow: hidden; background: linear-gradient(180deg, #EAF6FB 0%, #F5FAFD 55%, #ffffff 100%); padding: 78px 0 72px; }
  .a-hero__confetti { position: absolute; inset: 0; pointer-events: none; }
  .confetti { position: absolute; width: 16px; height: 16px; border-radius: 4px; opacity: 0.5; }
  .a-hero__inner { position: relative; display: flex; flex-direction: column; align-items: center; text-align: center; }
  .a-hero__eyebrow { font-size: 14px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; color: var(--giv-magenta); margin-bottom: 16px; }
  .a-hero__title { font-family: var(--giv-font-display); font-size: 58px; font-weight: 900; letter-spacing: -0.02em; line-height: 1.02; color: var(--giv-navy); margin: 0 0 18px; max-width: 16ch; text-wrap: balance; }
  .a-hero__sub { font-size: 19px; line-height: 1.55; color: var(--giv-grey-90); max-width: 60ch; margin: 0 0 32px; }
  .a-hero__search { display: flex; gap: 12px; width: 100%; max-width: 620px; }
  .a-hero__search .search { flex: 1; box-shadow: var(--giv-shadow-soft); }
  .a-hero__chips { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; margin-top: 22px; justify-content: center; }
  .a-hero__chip { font-size: 13px; font-weight: 700; color: var(--giv-navy); background: #fff; border: 1px solid var(--giv-grey-25); padding: 6px 13px; border-radius: var(--giv-radius-pill); cursor: pointer; transition: all 150ms; }
  .a-hero__chip:hover { border-color: var(--giv-cyan); color: var(--giv-cyan); }

  /* For You band */
  .foryou { background: var(--giv-navy); padding: 40px 0; }
  .foryou__head { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
  .foryou__title { display: flex; align-items: center; gap: 10px; font-family: var(--giv-font-display); font-size: 24px; font-weight: 900; color: #fff; margin: 0; }
  .foryou__grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .foryou__card { display: flex; align-items: center; gap: 14px; text-align: left; padding: 18px 20px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 12px; cursor: pointer; transition: background 150ms, border-color 150ms; }
  .foryou__card:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.3); }
  .foryou__icon { width: 46px; height: 46px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .foryou__icon .giv-icon { color: #fff; font-size: 24px; }
  .foryou__txt { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
  .foryou__cat { font-size: 12px; font-weight: 800; letter-spacing: 0.04em; text-transform: uppercase; color: #6FC7EC; }
  .foryou__name { font-size: 14px; font-weight: 700; color: #fff; line-height: 1.35; }
  .foryou__go { color: rgba(255,255,255,0.6); margin-left: auto; font-size: 20px; }
  @media (max-width: 980px) { .foryou__grid { grid-template-columns: 1fr; } }

  /* Sections */
  .section { padding: 64px 0; }
  .section--tint { background: var(--giv-grey-2); border-top: 1px solid var(--giv-grey-15); border-bottom: 1px solid var(--giv-grey-15); }
  .section__search { width: 320px; max-width: 38vw; }
  .filter-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 26px; }
  .linkcard__meta { position: absolute; top: 26px; right: 26px; font-size: 12px; font-weight: 700; color: var(--giv-grey-50); }

  /* CTA band */
  .cta-band { background: linear-gradient(120deg, #243776 0%, #6C3471 100%); padding: 56px 0; }
  .cta-band__inner { display: flex; align-items: center; justify-content: space-between; gap: 32px; }
  .cta-band h2 { font-family: var(--giv-font-display); font-size: 30px; font-weight: 900; color: #fff; margin: 0 0 8px; letter-spacing: -0.01em; }
  .cta-band p { font-size: 16px; color: rgba(255,255,255,0.82); margin: 0; max-width: 60ch; line-height: 1.5; }

  .a-readwrap { padding: 44px 0 72px; }
  .a-readwrap .reader { margin-left: 0; margin-right: 0; }
  .a-readwrap .crumbs { margin-bottom: 28px; }

  /* logged-in account hero (now the top of the page) */
  .tools-hero { position: relative; overflow: hidden; background: linear-gradient(180deg, #EAF6FB 0%, #F5FAFD 60%, #ffffff 100%); padding: 60px 0 56px; }
  .tools-hero__confetti { position: absolute; inset: 0; pointer-events: none; }
  .tools-hero__eyebrow { display: block; font-size: 14px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; color: var(--giv-magenta); margin-bottom: 12px; }
  .tools-hero__title { font-family: var(--giv-font-display); font-size: 46px; font-weight: 900; letter-spacing: -0.02em; line-height: 1.04; color: var(--giv-navy); margin: 0 0 12px; }
  .tools-hero__sub { font-size: 18px; color: var(--giv-grey-90); line-height: 1.5; max-width: 62ch; margin: 0 0 34px; }
  .tools-hero__grid { margin-top: 4px; }

  /* compact search band */
  .search-band { background: #fff; border-top: 1px solid var(--giv-grey-15); border-bottom: 1px solid var(--giv-grey-15); padding: 18px 0; }
  .search-band__inner { display: flex; align-items: center; gap: 24px; }
  .search-band__label { display: inline-flex; align-items: center; gap: 8px; font-weight: 800; font-size: 15px; color: var(--giv-navy); white-space: nowrap; }
  .search-band__label .giv-icon { font-size: 20px; color: var(--giv-cyan); }
  .search-band__form { display: flex; gap: 10px; flex: 1; max-width: 640px; }
  .search-band__form .search { flex: 1; height: 44px; }

  /* search submit button in hero */
  .a-hero__search .btn { flex-shrink: 0; }

  /* dedicated page (See All) */
  .a-page { padding: 44px 0 72px; min-height: 60vh; }
  .page-head { display: flex; flex-direction: column; gap: 16px; margin-bottom: 26px; }
  .page-back { display: inline-flex; align-items: center; gap: 6px; cursor: pointer; font-size: 14px; font-weight: 800; color: var(--giv-cyan); }
  .page-back .giv-icon { font-size: 20px; }
  .page-head__row { display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; flex-wrap: wrap; }
  .page-title { font-family: var(--giv-font-display); font-size: 38px; font-weight: 900; letter-spacing: -0.02em; color: var(--giv-navy); margin: 0; }
  .page-sub { font-size: 16px; color: var(--giv-fg-2); margin: 8px 0 0; max-width: 60ch; line-height: 1.5; }
  .page-head__search { width: 340px; max-width: 100%; }
  .page-count { font-size: 14px; color: var(--giv-grey-75); font-weight: 700; margin-bottom: 18px; }
  .results-group { margin-bottom: 44px; }
  .results-group h3 { font-family: var(--giv-font-display); font-size: 20px; font-weight: 900; color: var(--giv-navy); margin: 0 0 18px; display: flex; align-items: center; gap: 8px; }
  .results-group h3 .count { font-size: 14px; font-weight: 700; color: var(--giv-grey-75); }
  @media (max-width: 860px) { .page-head__search { width: 100%; } .page-title { font-size: 30px; } }

  @media (max-width: 860px) {
    .a-nav { display: none; }
    .a-hero__title { font-size: 40px; }
    .tools-hero__title { font-size: 32px; }
    .a-hero__search { flex-direction: column; }
    .section__search { display: none; }
    .search-band__inner { flex-direction: column; align-items: stretch; gap: 12px; }
    .search-band__form { max-width: none; }
    .cta-band__inner { flex-direction: column; align-items: flex-start; }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="data.jsx?v=2"></script>
<script type="text/babel" src="shared.jsx?v=2"></script>
<script type="text/babel" src="OptionA-v2.jsx?v=2"></script>
</body>
</html>
