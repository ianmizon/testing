<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Givergy Community · Sidebar Workspace</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0&display=block" rel="stylesheet" />
<link rel="stylesheet" href="community.css" />
<style>
  html, body { height: 100%; }
  .b-app { display: grid; grid-template-columns: 268px 1fr; height: 100vh; overflow: hidden; background: var(--giv-grey-2); }

  /* Sidebar */
  .b-sidebar { background: #fff; border-right: 1px solid var(--giv-grey-15); display: flex; flex-direction: column; min-height: 0; }
  .b-sidebar__brand { display: flex; align-items: center; gap: 11px; padding: 22px 22px 18px; }
  .b-sidebar__brand img { height: 40px; }
  .b-sidebar__tag { font-family: var(--giv-font-display); font-weight: 900; font-size: 17px; color: var(--giv-navy); padding-left: 11px; border-left: 1.5px solid var(--giv-grey-25); }
  .b-sidebar__scroll { flex: 1; overflow-y: auto; padding: 4px 12px 16px; }
  .b-nav__group { display: flex; flex-direction: column; gap: 2px; }
  .b-nav__sep { display: flex; align-items: center; gap: 8px; font-size: 11px; font-weight: 800; letter-spacing: 0.07em; text-transform: uppercase; color: var(--giv-grey-50); padding: 18px 12px 8px; }
  .b-nav__item { display: flex; align-items: center; gap: 12px; width: 100%; text-align: left; padding: 10px 12px; border: none; background: transparent; border-radius: 8px; cursor: pointer; font-family: var(--giv-font-body); font-weight: 700; font-size: 14px; color: var(--giv-grey-90); transition: background 150ms, color 150ms; }
  .b-nav__item:hover { background: var(--giv-grey-5); color: var(--giv-navy); }
  .b-nav__item.active { background: var(--giv-cyan-tint); color: var(--giv-navy); }
  .b-nav__item .giv-icon { font-size: 22px; color: inherit; flex-shrink: 0; }
  .b-nav__label { flex: 1; }
  .b-nav__ext { font-size: 15px !important; color: var(--giv-grey-50); }
  .b-sidebar__user { display: flex; align-items: center; gap: 10px; padding: 14px 16px; border-top: 1px solid var(--giv-grey-15); }
  .b-sidebar__userinfo { min-width: 0; flex: 1; }
  .b-sidebar__username { font-weight: 800; font-size: 13px; color: var(--giv-grey-100); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .b-sidebar__userorg { font-size: 12px; color: var(--giv-fg-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .b-sidebar__logout { border: none; background: transparent; cursor: pointer; color: var(--giv-grey-75); padding: 6px; border-radius: 7px; display: flex; }
  .b-sidebar__logout:hover { background: var(--giv-grey-5); color: var(--giv-navy); }

  /* Main */
  .b-main { overflow-y: auto; min-width: 0; }
  .b-topbar { position: sticky; top: 0; z-index: 10; background: rgba(255,255,255,0.9); backdrop-filter: saturate(160%) blur(10px); border-bottom: 1px solid var(--giv-grey-15); padding: 18px 40px; display: flex; align-items: center; gap: 24px; }
  .b-topbar__titles { flex: 1; min-width: 0; }
  .b-topbar__title { font-family: var(--giv-font-display); font-size: 26px; font-weight: 900; color: var(--giv-navy); margin: 0; letter-spacing: -0.01em; }
  .b-topbar__sub { font-size: 14px; color: var(--giv-fg-2); margin: 3px 0 0; }
  .b-topbar__tools { display: flex; align-items: center; gap: 14px; }
  .b-topbar__search { width: 300px; height: 44px; }
  .b-content { padding: 32px 40px 56px; max-width: 1080px; }

  /* Hero (inside content) */
  .b-hero { position: relative; overflow: hidden; border-radius: 16px; background: linear-gradient(120deg, #243776 0%, #2c4790 55%, #6C3471 130%); padding: 44px 44px; margin-bottom: 36px; }
  .b-hero--member { background: linear-gradient(120deg, #1d2c5e 0%, #6C3471 130%); }
  .b-hero__confetti { position: absolute; inset: 0; pointer-events: none; }
  .b-hero__content { position: relative; }
  .b-hero__eyebrow { font-size: 13px; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase; color: #6FC7EC; }
  .b-hero__title { font-family: var(--giv-font-display); font-size: 38px; font-weight: 900; letter-spacing: -0.02em; line-height: 1.05; color: #fff; margin: 12px 0 12px; max-width: 18ch; text-wrap: balance; }
  .b-hero__sub { font-size: 17px; line-height: 1.5; color: rgba(255,255,255,0.85); max-width: 56ch; margin: 0 0 24px; }
  .b-hero__actions { display: flex; gap: 12px; flex-wrap: wrap; }

  /* Blocks */
  .b-block { margin-bottom: 40px; }
  .b-block__head { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 18px; }
  .b-block__head h3 { display: flex; align-items: center; gap: 9px; font-family: var(--giv-font-display); font-size: 21px; font-weight: 900; color: var(--giv-navy); margin: 0; }
  .b-block__head h3 .giv-icon { font-size: 24px; }

  /* Row items */
  .b-rows { display: flex; flex-direction: column; gap: 12px; }
  .b-row { display: flex; align-items: center; gap: 18px; text-align: left; width: 100%; padding: 16px; background: #fff; border: 1px solid var(--giv-grey-25); border-radius: var(--giv-radius-card); cursor: pointer; transition: box-shadow 160ms, border-color 160ms, transform 160ms; }
  .b-row:hover { box-shadow: var(--giv-shadow-soft); border-color: var(--giv-grey-50); transform: translateX(2px); }
  .b-row__thumb { width: 84px; height: 64px; border-radius: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .b-row__thumb .giv-icon { color: #fff; font-size: 28px; }
  .b-row__body { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 0; }
  .b-row__top { display: flex; align-items: center; gap: 12px; }
  .b-row__read { font-size: 12px; color: var(--giv-grey-75); }
  .b-row__title { font-family: var(--giv-font-display); font-size: 17px; font-weight: 800; color: var(--giv-grey-100); line-height: 1.25; }
  .b-row__excerpt { font-size: 14px; color: var(--giv-fg-2); line-height: 1.45; }
  .b-row__go { color: var(--giv-grey-50); font-size: 24px; flex-shrink: 0; }
  .b-row:hover .b-row__go { color: var(--giv-cyan); }

  /* For You cards */
  .b-foryou { display: flex; flex-direction: column; gap: 8px; align-items: flex-start; text-align: left; padding: 20px; background: #fff; border: 1px solid var(--giv-grey-25); border-radius: var(--giv-radius-card); cursor: pointer; transition: box-shadow 160ms, transform 160ms, border-color 160ms; }
  .b-foryou:hover { box-shadow: var(--giv-shadow-soft); transform: translateY(-2px); border-color: var(--giv-magenta); }
  .b-foryou .foryou__icon { margin-bottom: 4px; }
  .b-foryou__cat { font-size: 12px; font-weight: 800; letter-spacing: 0.03em; text-transform: uppercase; color: var(--giv-magenta); }
  .b-foryou__name { font-size: 15px; font-weight: 700; color: var(--giv-grey-100); line-height: 1.35; }

  .filter-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 22px; }
  .b-readwrap { padding: 8px 0 20px; }
  .b-main .foot { margin-top: 20px; }
  .b-main .foot__inner { max-width: none; padding: 48px 40px 36px; }

  @media (max-width: 880px) {
    .b-app { grid-template-columns: 1fr; }
    .b-sidebar { display: none; }
    .b-topbar__search { width: 180px; }
    .b-content { padding: 24px 20px 48px; }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="OptionB.jsx"></script>
</body>
</html>
